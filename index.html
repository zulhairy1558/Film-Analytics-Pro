<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Film Property Analytics Pro – AI-Augmented</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Film Analytics">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <meta name="theme-color" content="#1e293b">
    <link rel="manifest" href="/manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Chart libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0/dist/chartjs-plugin-annotation.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- IndexedDB wrapper (Dexie) for memory scalability -->
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <!-- Custom styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="text-gray-900 min-h-screen flex flex-col overflow-x-hidden">

    <header class="bg-slate-800 text-white shadow-md z-10 shrink-0">
        <div class="w-full px-4 lg:px-8 py-4 flex flex-col md:flex-row justify-between items-center gap-4 border-b border-slate-700">
            <h1 class="text-xl font-extrabold tracking-tight flex items-center gap-2">
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                FILM ANALYTICS <span class="text-blue-400 font-light">PRO</span>
            </h1>
            <div class="flex gap-3">
                <label class="cursor-pointer bg-slate-700 hover:bg-slate-600 px-4 py-2 text-sm rounded font-medium transition-colors border border-slate-600">
                    Load Session <input type="file" id="load-session-input" class="hidden" accept=".json">
                </label>
                <button id="save-session-btn" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 text-sm rounded font-medium transition-colors border border-blue-500">Save Session</button>
                <button id="reset-btn" class="bg-red-600 hover:bg-red-500 px-4 py-2 text-sm rounded font-medium transition-colors border border-red-500">Reset</button>
                <button id="pwa-install-btn" class="hidden bg-green-600 hover:bg-green-500 px-4 py-2 text-sm rounded font-medium transition-colors border border-green-500">Install App</button>
            </div>
        </div>
        <div class="w-full px-4 lg:px-8 flex overflow-x-auto pt-3 gap-1" id="tab-container"></div>
    </header>

    <main class="w-full px-4 lg:px-8 py-6 flex flex-col lg:flex-row gap-6 flex-1">
        <!-- Sidebar -->
        <aside class="w-full lg:w-80 flex flex-col gap-4 shrink-0">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-xs font-bold text-gray-500 uppercase">Testing Samples</h2>
                    <label class="cursor-pointer text-[10px] bg-blue-600 text-white px-2 py-1 rounded font-bold hover:bg-blue-700">
                        ADD <input type="file" id="test-file-input" class="hidden" multiple accept=".json">
                    </label>
                </div>
                <div id="test-file-list" class="space-y-1 max-h-48 overflow-y-auto pr-1"></div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-xs font-bold text-gray-500 uppercase">Database Reference</h2>
                    <label class="cursor-pointer text-[10px] bg-slate-700 text-white px-2 py-1 rounded font-bold hover:bg-slate-800">
                        FOLDER <input type="file" id="db-folder-input" class="hidden" webkitdirectory directory multiple>
                    </label>
                </div>
                <div id="db-file-list" class="space-y-1 max-h-48 overflow-y-auto pr-1"></div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-xs font-bold text-gray-800 uppercase mb-3 tracking-wider flex items-center gap-2">
                    <svg class="w-4 h-4 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                    QC Parameters
                </h2>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-slate-50 p-2 rounded border border-slate-200">
                        <label class="text-[9px] font-bold text-slate-500 block">UPPER TOL %</label>
                        <input type="number" id="upper-tol" value="10" class="w-full bg-transparent font-bold text-slate-800 text-sm outline-none">
                    </div>
                    <div class="bg-slate-50 p-2 rounded border border-slate-200">
                        <label class="text-[9px] font-bold text-slate-500 block">LOWER TOL %</label>
                        <input type="number" id="lower-tol" value="10" class="w-full bg-transparent font-bold text-slate-800 text-sm outline-none">
                    </div>
                </div>
                <div id="ult-strain-tol-row" class="hidden grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-slate-50 p-2 rounded border border-slate-200">
                        <label class="text-[9px] font-bold text-slate-500 block">ULT STRAIN TOL %</label>
                        <input type="number" id="ult-strain-tol" value="10" class="w-full bg-transparent font-bold text-slate-800 text-sm outline-none">
                    </div>
                </div>
                <div id="force-dev-tol-row" class="hidden grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-slate-50 p-2 rounded border border-slate-200">
                        <label class="text-[9px] font-bold text-slate-500 block">FORCE DEV TOL %</label>
                        <input type="number" id="force-dev-tol" value="7" class="w-full bg-transparent font-bold text-slate-800 text-sm outline-none">
                    </div>
                </div>
                <div id="break-time-tol-row" class="hidden grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-slate-50 p-2 rounded border border-slate-200">
                        <label class="text-[9px] font-bold text-slate-500 block">BREAK TIME TOL %</label>
                        <input type="number" id="break-time-tol" value="10" class="w-full bg-transparent font-bold text-slate-800 text-sm outline-none">
                    </div>
                </div>
                <div class="space-y-2 border-t pt-3">
                    <label id="ndr-toggle-container" class="flex items-center justify-between cursor-pointer group">
                        <span class="text-xs font-semibold text-slate-600">Calculated NDR</span>
                        <input type="checkbox" id="toggle-optimum" checked class="w-4 h-4 accent-green-600">
                    </label>
                    <label class="flex items-center justify-between cursor-pointer">
                        <span class="text-xs font-semibold text-slate-600">Show Anomalies</span>
                        <input type="checkbox" id="toggle-anomalies" checked class="w-4 h-4 accent-red-600">
                    </label>
                    <label class="flex items-center justify-between cursor-pointer">
                        <span class="text-xs font-semibold text-slate-600">Smart Pre-Filter</span>
                        <input type="checkbox" id="toggle-prefilter" checked class="w-4 h-4 accent-indigo-600">
                    </label>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-xs font-bold text-gray-500 uppercase mb-3">Display Metrics</h2>
                <div id="metrics-container" class="space-y-1"></div>
            </div>

            <button id="clear-tab-btn" class="w-full py-2 bg-red-50 text-red-600 text-sm font-bold rounded-lg border border-red-100 hover:bg-red-100">Clear Tab</button>
        </aside>

        <!-- Chart Section -->
        <section class="flex-1 flex flex-col min-w-0 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 h-[500px] flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h2 id="chart-main-title" class="text-lg font-bold text-gray-800">Analytics View</h2>
                        <p id="chart-sub-title" class="text-xs text-gray-500">Loading Data...</p>
                    </div>
                    <div class="flex gap-2">
                        <button id="toggle-legend-btn" class="text-xs font-semibold bg-gray-50 text-gray-700 px-4 py-2 rounded border border-gray-200">Legend</button>
                        <button id="export-excel-btn" class="text-xs font-semibold bg-emerald-50 text-emerald-700 px-4 py-2 rounded border border-emerald-200">Excel</button>
                        <button id="download-png-btn" class="text-xs font-semibold bg-gray-50 text-gray-700 px-4 py-2 rounded border border-gray-200">PNG</button>
                    </div>
                </div>
                <div class="flex-1 relative"><canvas id="mainChart"></canvas></div>
            </div>

            <!-- Intelligence Table -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col flex-1">
                <div class="bg-slate-800 px-5 py-3 flex justify-between items-center">
                    <h3 class="text-sm font-bold text-white flex items-center gap-2">Intelligence & Deviations</h3>
                    <div id="ndr-value-display" class="text-[10px] font-bold text-gray-300 flex flex-wrap gap-2"></div>
                </div>
                <div class="overflow-x-auto overflow-y-auto flex-1">
                    <table class="w-full text-left text-xs whitespace-nowrap" id="analysis-table">
                        <thead class="bg-slate-50 text-slate-500 sticky top-0 border-b z-10">
                            <tr id="analysis-header-row"></tr>
                        </thead>
                        <tbody id="analysis-table-body" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
                <div id="stress-summary-container" class="px-5 pb-4 hidden">
                    <h4 class="text-xs font-bold text-gray-500 uppercase mt-4 mb-2 border-t pt-3">Curve Summary</h4>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs whitespace-nowrap" id="stress-summary-table">
                            <thead class="bg-slate-50 text-slate-500 border-b">
                                <tr>
                                    <th class="px-4 py-2">Pair</th>
                                    <th class="px-4 py-2">CATEGORY</th>
                                    <th class="px-4 py-2 text-right">Ult Strain [%]</th>
                                    <th class="px-4 py-2 text-right">Ult. Stretch Force</th>
                                    <th class="px-4 py-2 text-right">Ult. Wind Force</th>
                                    <th class="px-4 py-2 text-right">NDR [%]</th>
                                    <th class="px-4 py-2 text-right">Stretch Force @ NDR</th>
                                    <th class="px-4 py-2 text-right">Wind Force @ NDR</th>
                                </tr>
                            </thead>
                            <tbody id="stress-summary-body" class="divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Application scripts (order matters) -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/cache.js"></script>
    <script src="js/comparison.js"></script>
    <script src="js/worker-code.js"></script>
    <script src="js/db.js"></script>
    <script src="js/state.js"></script>
    <script src="js/chart.js"></script>
    <script src="js/table.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
